<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <header>
    <h1>💰 Expense Tracker</h1>
    <p>DOM + Arrays + localStorage practice project</p>
  </header>

  <div class="balance-card">
    <div class="label">Current Balance</div>
    <div class="amount" id="currentBalance">₹0.00</div>

    <div class="balance-sub">
      <div class="box income">
        <div class="label">Income</div>
        <div class="value" id="totalIncome">₹0.00</div>
      </div>

      <div class="box expense">
        <div class="label">Expense</div>
        <div class="value" id="totalExpense">₹0.00</div>
      </div>
    </div>
  </div>

  <div class="form-card">
    <div class="row">
      <input type="text" id="descInput" placeholder="e.g. Groceries">
      <input type="number" id="amountInput" placeholder="Amount">
    </div>

    <div class="row">
      <select id="typeInput">
        <option value="expense">Expense</option>
        <option value="income">Income</option>
      </select>

      <select id="categoryInput">
        <option value="Food">Food</option>
        <option value="Salary">Salary</option>
        <option value="Transport">Transport</option>
        <option value="Shopping">Shopping</option>
        <option value="Bills">Bills</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <button class="add-btn" id="addBtn">Add Entry</button>
  </div>

  <div class="entries-header">
    <h2>Recent Entries</h2>

    <div class="header-actions">
      <button class="refresh-btn" id="refreshBtn" title="Refresh">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
          <polyline points="21 3 21 9 15 9"></polyline>
        </svg>
      </button>

      <button class="clear-all" id="clearAllBtn">Clear All</button>
    </div>
  </div>

  <div class="entries-list" id="entriesList"></div>
</div>

<script src="script.js"></script>

</body>
</html>
